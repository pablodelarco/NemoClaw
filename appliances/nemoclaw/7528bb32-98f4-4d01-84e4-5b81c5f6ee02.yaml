name: NemoClaw
version: 0.1.0-1-20260325
publisher: Pablo del Arco
publisher_email: pdelarco@opennebula.io
description: |-
  Appliance with preinstalled [NemoClaw](https://www.nvidia.com/en-us/ai/nemoclaw/),
  NVIDIA's open-source AI agent security stack built on OpenClaw.

  NemoClaw provides secure, sandboxed execution of AI agents with:
  - **Landlock + seccomp isolation** for filesystem and process hardening
  - **Network egress policies** controlling what AI agents can access
  - **NVIDIA Nemotron inference** via NVIDIA Endpoints API
  - **GPU passthrough support** for local inference (optional)

  **This appliance provides:**
  - Ubuntu 24.04 LTS base operating system
  - Docker Engine CE with NVIDIA Container Toolkit
  - NVIDIA driver 550-server for GPU passthrough
  - NemoClaw CLI and OpenShell runtime pre-installed
  - Node.js 22 LTS
  - SSH key authentication from OpenNebula context
  - VNC console access via Sunstone

  **Quick Start:**
  1. Deploy this appliance from the OpenNebula Marketplace
  2. SSH into the VM: `ssh root@<VM_IP>` (password: `opennebula`)
  3. Run: `nemoclaw onboard`
  4. Follow the interactive setup wizard (requires NVIDIA API key from [build.nvidia.com](https://build.nvidia.com))
  5. Connect to your sandbox: `nemoclaw <name> connect`

  **GPU Support:**
  For GPU passthrough, configure PCI device assignment on the OpenNebula host
  with IOMMU enabled. The appliance auto-detects NVIDIA GPUs and configures
  the container runtime accordingly.

  **Documentation:**
  - [NemoClaw Developer Guide](https://docs.nvidia.com/nemoclaw/latest/)
  - [Appliance Guide](https://github.com/OpenNebula/marketplace-community/blob/master/appliances/nemoclaw/README.md)
  - [NemoClaw GitHub](https://github.com/NVIDIA/NemoClaw)

  > **Note:** NemoClaw is alpha software. APIs may change between releases.

